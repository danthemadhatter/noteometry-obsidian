name: Auto-tag from manifest version

# Created in v1.7.3 because the sandbox proxy blocks tag pushes from
# Claude. When manifest.json on this branch declares a new version,
# this workflow creates and pushes the matching v$VERSION tag from
# inside Actions (which has contents: write via GITHUB_TOKEN). The
# pushed tag then fires the existing main.yml release flow.
#
# Idempotent: if the tag already exists, the create-tag step is
# skipped. Safe to fire on every push to the branch.

on:
  push:
    branches: ["claude/obsidian-plugin-builder-Hccne"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from manifest.json
        id: ver
        run: |
          VERSION=$(jq -r .version manifest.json)
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist yet; will create."
          fi

      - name: Configure git identity
        if: steps.ver.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.ver.outputs.exists == 'false'
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
