name: Auto-tag and release from manifest version

# Created in v1.7.3 because the sandbox proxy blocks tag pushes from
# Claude. This workflow runs inside GitHub Actions, where GITHUB_TOKEN
# has contents: write, so it can create and push the tag server-side
# AND build + publish the release in the same run.
#
# The release step has to live in this workflow (not main.yml) because
# tags pushed by GITHUB_TOKEN don't trigger downstream workflows
# — that's GitHub's loop-prevention guard. Combining tag + release
# into one workflow side-steps the guard cleanly.
#
# Idempotent: builds and publishes a release IFF a release for the
# resolved tag doesn't already exist on origin. So this can recover
# orphaned tags (tag exists, release missing) without the operator
# having to delete and re-push the tag.

on:
  push:
    branches: ["claude/obsidian-plugin-builder-Hccne"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      should_release: ${{ steps.release-check.outputs.release_exists == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from manifest.json
        id: ver
        run: |
          VERSION=$(jq -r .version manifest.json)
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; skipping create."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist yet; will create."
          fi

      - name: Configure git identity
        if: steps.ver.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.ver.outputs.tag_exists == 'false'
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Check if release already exists for this tag
        id: release-check
        run: |
          HTTP=$(curl -sL --max-time 10 -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.ver.outputs.tag }}")
          if [ "$HTTP" = "404" ]; then
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "No release exists for ${{ steps.ver.outputs.tag }} yet; will build."
          else
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release for ${{ steps.ver.outputs.tag }} already exists (HTTP $HTTP); skipping build."
          fi

  build-and-release:
    needs: auto-tag
    if: needs.auto-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout at the resolved tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify release artifacts exist
        run: |
          for f in main.js styles.css manifest.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing release artifact: $f"
              exit 1
            fi
            echo "$f: $(wc -c < "$f") bytes"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            styles.css
            manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: ${{ needs.auto-tag.outputs.tag }}
          tag_name: ${{ needs.auto-tag.outputs.tag }}
