name: Auto-tag and release from manifest version

# Single source of truth for shipping releases. Fires on every push to
# `main`, reads the version from manifest.json, idempotently creates
# the matching tag if it doesn't already exist, then builds + publishes
# the release in the same run.
#
# Why this and not a tag-push workflow:
#  - Tag pushes from Claude's sandbox proxy return HTTP 403 silently,
#    so we can't reliably push tags from a local git client. Running
#    inside GitHub Actions, GITHUB_TOKEN has contents: write and can
#    create + push tags server-side.
#  - We had a second workflow (.github/workflows/main.yml) that fired
#    on `push: tags` and built whatever was at the tagged ref. Any
#    stray tag push (an old script, a misfired AI session) would
#    spawn a release for an ancient ref. The v1.8.7 zombie draft
#    release on 2026-05-09 was caused by exactly that. main.yml was
#    deleted in the chore-remove-redundant-main-yml PR; this workflow
#    is now the only path that publishes a release.
#
# Idempotent: skips entirely if a release already exists for the tag
# the manifest declares.
#
# Manual escape hatch: `workflow_dispatch: {}` lets you trigger this
# from the Actions UI without pushing to main.

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      should_release: ${{ steps.release-check.outputs.release_exists == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from manifest.json
        id: ver
        run: |
          VERSION=$(jq -r .version manifest.json)
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists on origin; skipping create."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist yet; will create."
          fi

      - name: Configure git identity
        if: steps.ver.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.ver.outputs.tag_exists == 'false'
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Check if release already exists for this tag
        id: release-check
        run: |
          HTTP=$(curl -sL --max-time 10 -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.ver.outputs.tag }}")
          if [ "$HTTP" = "404" ]; then
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "No release exists for ${{ steps.ver.outputs.tag }} yet; will build."
          else
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release for ${{ steps.ver.outputs.tag }} already exists (HTTP $HTTP); skipping build."
          fi

  build-and-release:
    needs: auto-tag
    if: needs.auto-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout at the resolved tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify release artifacts exist
        run: |
          for f in main.js styles.css manifest.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing release artifact: $f"
              exit 1
            fi
            echo "$f: $(wc -c < "$f") bytes"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            styles.css
            manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: ${{ needs.auto-tag.outputs.tag }}
          tag_name: ${{ needs.auto-tag.outputs.tag }}
