name: Release Noteometry plugin

# Triggers on any pushed tag — matches the standard Obsidian community
# plugin release flow. Use `npm version patch && git push --follow-tags`
# to bump + tag + push in one shot; the workflow then builds main.js and
# attaches it along with styles.css and manifest.json to a GitHub release
# so BRAT (or manual download) can install the new version on any device.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify release artifacts exist
        run: |
          for f in main.js styles.css manifest.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing release artifact: $f"
              exit 1
            fi
            echo "$f: $(wc -c < "$f") bytes"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            styles.css
            manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
